<!DOCTYPE html>
<html>

<head>
    <title>Docker Glass Music Player</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            background:
                linear-gradient(
                    135deg,
                    #0f2027,
                    #203a43,
                    #2c5364
                );

            overflow: hidden;

            font-family: Arial, sans-serif;
        }

        body::before {

            content: "";

            position: absolute;

            width: 600px;
            height: 600px;

            background:
                radial-gradient(
                    circle,
                    rgba(0,255,200,0.25),
                    transparent
                );

            top: -150px;
            left: -150px;

            animation: float 8s infinite alternate;
        }

        body::after {

            content: "";

            position: absolute;

            width: 500px;
            height: 500px;

            background:
                radial-gradient(
                    circle,
                    rgba(0,150,255,0.25),
                    transparent
                );

            bottom: -150px;
            right: -150px;

            animation: float2 10s infinite alternate;
        }

        @keyframes float {

            from {
                transform: translateY(0px);
            }

            to {
                transform: translateY(60px);
            }
        }

        @keyframes float2 {

            from {
                transform: translateX(0px);
            }

            to {
                transform: translateX(-60px);
            }
        }

        .player {

            position: relative;

            width: 500px;

            padding: 30px;

            border-radius: 30px;

            background:
                rgba(255,255,255,0.08);

            backdrop-filter: blur(20px);

            border:
                1px solid rgba(255,255,255,0.15);

            box-shadow:
                0 8px 32px rgba(0,0,0,0.35);

            color: white;

            z-index: 10;
        }

        h1 {

            text-align: center;

            margin-bottom: 20px;

            font-size: 32px;

            color: #ffffff;
        }

        audio {

            width: 100%;

            margin-top: 15px;
        }

        .controls {

            text-align: center;

            margin-top: 20px;
        }

        button {

            border: none;

            padding: 12px 20px;

            margin: 10px;

            border-radius: 16px;

            background:
                rgba(255,255,255,0.12);

            color: white;

            cursor: pointer;

            font-size: 16px;

            backdrop-filter: blur(10px);

            transition: 0.3s;
        }

        button:hover {

            transform: scale(1.08);

            background:
                rgba(255,255,255,0.22);
        }

        .nowPlaying {

            margin-top: 20px;

            text-align: center;

            font-size: 18px;

            color: #00ffcc;
        }

        ul {

            list-style: none;

            margin-top: 25px;

            max-height: 300px;

            overflow-y: auto;
        }

        li {

            padding: 14px;

            margin-bottom: 10px;

            border-radius: 16px;

            background:
                rgba(255,255,255,0.08);

            cursor: pointer;

            transition: 0.3s;
        }

        li:hover {

            transform: translateX(5px);

            background:
                rgba(255,255,255,0.18);
        }

        ::-webkit-scrollbar {

            width: 6px;
        }

        ::-webkit-scrollbar-thumb {

            background: rgba(255,255,255,0.2);

            border-radius: 20px;
        }

    </style>

</head>

<body>

    <div class="player">

        <h1>Docker Glass Player</h1>

        <audio id="audioPlayer" controls></audio>

        <div class="controls">

            <button onclick="prevSong()">
                Prev
            </button>

            <button onclick="nextSong()">
                Next 
            </button>

        </div>

        <div
            class="nowPlaying"
            id="nowPlaying">

            No song playing

        </div>

        <ul id="playlist"></ul>

    </div>

    <script>

        let songs = [];

        let currentSong = 0;

        const audioPlayer =
            document.getElementById(
                "audioPlayer"
            );

        const playlist =
            document.getElementById(
                "playlist"
            );

        const nowPlaying =
            document.getElementById(
                "nowPlaying"
            );

        async function loadSongs() {

            const response =
                await fetch('/songs/');

            const text =
                await response.text();

            const parser =
                new DOMParser();

            const htmlDoc =
                parser.parseFromString(
                    text,
                    'text/html'
                );

            const links =
                htmlDoc.querySelectorAll('a');

            links.forEach((link) => {

                const fileName =
                    link.getAttribute('href');

                if (
                    fileName &&
                    fileName.endsWith('.mp3') &&
                    !songs.includes(
                        'songs/' + fileName
                    )
                ) {

                    songs.push(
                        'songs/' + fileName
                    );

                    const songIndex =
                        songs.length - 1;

                    const li =
                        document.createElement('li');

                    li.textContent =
                        fileName
                        .replaceAll('_', ' ')
                        .replace('.mp3', '');

                    li.onclick = () =>
                        playSong(songIndex);

                    playlist.appendChild(li);
                }
            });

            if (songs.length > 0) {

                audioPlayer.src =
                    songs[0];

                updateNowPlaying();
            }
        }

        function updateNowPlaying() {

            const songName =
                songs[currentSong]
                .replace('songs/', '')
                .replaceAll('_', ' ')
                .replace('.mp3', '');

            nowPlaying.innerText =
                "Now Playing: " + songName;
        }

        function playSong(index) {

            currentSong = index;

            audioPlayer.src =
                songs[currentSong];

            audioPlayer.play();

            updateNowPlaying();
        }

        function nextSong() {

            currentSong =
                (currentSong + 1)
                % songs.length;

            playSong(currentSong);
        }

        function prevSong() {

            currentSong =
                (currentSong - 1 + songs.length)
                % songs.length;

            playSong(currentSong);
        }

        audioPlayer.addEventListener(
            'ended',
            nextSong
        );

        loadSongs();

    </script>

</body>

</html>
