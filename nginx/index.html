<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Docker Nginx Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px;
    }

    h1 {
      color: #333;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
      background: #0078ff;
      color: white;
    }

    button:hover {
      opacity: 0.9;
    }

    #message {
      margin-top: 20px;
      font-size: 18px;
      color: #444;
    }

    input {
      margin-top: 15px;
      padding: 10px;
      width: 80%;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NGINX Docker Demo</h1>

    <p>Enter your name:</p>

    <input type="text" id="nameInput" placeholder="Type your name" />

    <br />

    <button onclick="showMessage()">Click Me</button>

    <div id="message"></div>
  </div>

  <script>
    function showMessage() {
      const name = document.getElementById('nameInput').value;
      const message = document.getElementById('message');

      if (name.trim() === '') {
        message.innerHTML = 'Please enter your name!';
      } else {
        message.innerHTML = `Hello, ${name}! Your custom NGINX container is working.`;
      }
    }
  </script>
</body>
</html>
